name: BTC Alert

on:
  schedule:
    - cron: '0 8 * * *'

jobs:
  send-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python btc_alert.py
